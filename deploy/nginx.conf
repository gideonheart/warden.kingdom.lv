# Warden Dashboard - Nginx Configuration Reference
# SSL termination, IP whitelist, and WebSocket upgrade
#
# Usage:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/warden.kingdom.lv
#   sudo ln -s /etc/nginx/sites-available/warden.kingdom.lv /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

upstream warden_backend {
    server 127.0.0.1:3001;
    keepalive 64;
}

server {
    listen 80;
    server_name warden.kingdom.lv;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name warden.kingdom.lv;

    # SSL certificates (Let's Encrypt or custom)
    ssl_certificate     /etc/letsencrypt/live/warden.kingdom.lv/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/warden.kingdom.lv/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # IP whitelist - restrict access to operator IP
    allow 94.30.169.76;
    deny all;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Proxy to Warden backend
    location / {
        proxy_pass http://warden_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket upgrade for Socket.IO
    location /socket.io/ {
        proxy_pass http://warden_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeouts
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Health check (bypass IP whitelist if needed for monitoring)
    location = /api/health {
        proxy_pass http://warden_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
